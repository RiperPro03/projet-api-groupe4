services:
  nginx:
    image: nginx:alpine
    container_name: nginx-public
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - breezy-network

  nginx-internal:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./infra/nginx-internal/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - profile-service
    networks:
      - breezy-network

  auth-postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-postgres:
    image: postgres:17-alpine
    container_name: user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_password
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-mongodb:
    image: mongo:8
    container_name: profile-mongodb
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - profile_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./apps/api-gateway/.env
    environment:
      PORT: 3000
      INTERNAL_NGINX_URL: http://nginx-internal
    depends_on:
      - nginx-internal
    networks:
      - breezy-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_URL: http://nginx/api
    expose:
      - "4000"
    networks:
      - breezy-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://auth_user:auth_password@auth-postgres:5432/auth_db?schema=public
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - breezy-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3002"
    env_file:
      - ./services/user-service/.env
    environment:
      DATABASE_URL: postgresql://user_user:user_password@user-postgres:5432/user_db?schema=public
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - breezy-network

  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3006"
    env_file:
      - ./services/profile-service/.env
    environment:
      MONGO_URI: mongodb://profile-mongodb:27017/profile_db
    depends_on:
      profile-mongodb:
        condition: service_healthy
    networks:
      - breezy-network

volumes:
  auth_postgres_data:
  user_postgres_data:
  profile_mongodb_data:

networks:
  breezy-network:
    driver: bridge
