events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name riperpro-playhub.duckdns.org;
        client_max_body_size 10g;

        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-load-balancer","status":"OK"}';
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name riperpro-playhub.duckdns.org;
        client_max_body_size 10g;

        ssl_certificate /etc/letsencrypt/live/riperpro-playhub.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/riperpro-playhub.duckdns.org/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-load-balancer","status":"OK"}';
        }

        location = /api {
            return 301 /api/;
        }

        location /api/ {
            set $api_gateway http://api-gateway:3000;
            rewrite ^/api/?(.*)$ /$1 break;
            proxy_pass $api_gateway;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }

        location = /chat/health {
            set $chat_service http://chat-service:3009;
            proxy_pass $chat_service/health;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }

        location /chat/socket.io/ {
            set $chat_service http://chat-service:3009;
            proxy_pass $chat_service;

            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }

        location = /minio {
            return 301 /minio/;
        }

        location /minio/ {
            client_max_body_size 10g;
            set $minio http://minio:9000;
            rewrite ^/minio/?(.*)$ /$1 break;
            proxy_pass $minio;

            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }

        location = /minio-console {
            return 301 /minio-console/;
        }

        location /minio-console/ {
            client_max_body_size 10g;
            set $minio_console http://minio:9001;
            rewrite ^/minio-console/?(.*)$ /$1 break;
            proxy_pass $minio_console;

            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
            proxy_set_header X-Forwarded-Prefix /minio-console;
            proxy_redirect ~^(/.*)$ /minio-console$1;
            proxy_cookie_path / /minio-console/;
        }

        location / {
            set $frontend http://frontend:4000;
            proxy_pass $frontend;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }
    }
}
