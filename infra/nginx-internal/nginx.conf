events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream auth_service_cluster {
        least_conn;
        server auth-service:3001;
    }

    upstream user_service_cluster {
        least_conn;
        server user-service:3002;
    }

    upstream profile_service_cluster {
        least_conn;
        server profile-service:3006;
    }

    upstream post_service_cluster {
        least_conn;
        server post-service:3003;
    }

    upstream media_service_cluster {
        least_conn;
        server media-service:3005;
    }

    upstream follow_service_cluster {
        least_conn;
        server follow-service:3004;
    }

    upstream interaction_service_cluster {
        least_conn;
        server interaction-service:3007;
    }

    upstream notification_service_cluster {
        least_conn;
        server notification-service:3008;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-internal","status":"OK"}';
        }

        location = /auth {
            return 308 /auth/;
        }

        location /auth/ {
            proxy_pass http://auth_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /users {
            return 308 /users/;
        }

        location /users/ {
            proxy_pass http://user_service_cluster/users-state/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /profiles {
            return 308 /profiles/;
        }

        location /profiles/ {
            proxy_pass http://profile_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /posts {
            return 308 /posts/;
        }

        location /posts/ {
            proxy_pass http://post_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /media {
            return 308 /media/;
        }

        location /media/ {
            proxy_pass http://media_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /follows {
            return 308 /follows/;
        }

        location /follows/ {
            proxy_pass http://follow_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /interactions {
            return 308 /interactions/;
        }

        location /interactions/ {
            proxy_pass http://interaction_service_cluster/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /notifications {
            proxy_pass http://notification_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /notifications/ {
            proxy_pass http://notification_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /chat/health {
            set $chat_service http://chat-service:3009;
            proxy_pass $chat_service/health;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /chat/socket.io/ {
            set $chat_service http://chat-service:3009;
            proxy_pass $chat_service;

            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            default_type application/json;
            return 404 '{"status":"error","message":"Unknown internal route"}';
        }
    }
}
