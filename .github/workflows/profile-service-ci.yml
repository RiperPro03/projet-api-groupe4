name: Profile Service CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    paths:
      - "services/profile-service/**"
      - ".github/workflows/profile-service-ci.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "services/profile-service/**"
      - ".github/workflows/profile-service-ci.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  profile-service:
    name: Build and Test Profile Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/profile-service
    env:
      NODE_ENV: test
      SERVICE_NAME: profile-service-test
      MONGO_URI: mongodb://localhost:27019/profile_service_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            services/profile-service/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage
