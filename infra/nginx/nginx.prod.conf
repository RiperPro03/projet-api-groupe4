events {}

http {
    upstream api_gateway_cluster {
        least_conn;
        server api-gateway:3000;
    }

    upstream frontend_cluster {
        least_conn;
        server frontend:4000;
    }

    upstream minio_cluster {
        least_conn;
        server minio:9000;
    }

    server {
        listen 80;
        server_name riperpro-playhub.duckdns.org;

        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-load-balancer","status":"OK"}';
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name riperpro-playhub.duckdns.org;
        client_max_body_size 100m;

        ssl_certificate /etc/letsencrypt/live/riperpro-playhub.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/riperpro-playhub.duckdns.org/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-load-balancer","status":"OK"}';
        }

        location = /api {
            return 301 /api/;
        }

        location /api/ {
            proxy_pass http://api_gateway_cluster/;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }

        location = /minio {
            return 301 /minio/;
        }

        location /minio/ {
            proxy_pass http://minio_cluster/;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }

        location / {
            proxy_pass http://frontend_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;
        }
    }
}
