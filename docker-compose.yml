services:
  nginx:
    image: nginx:alpine
    container_name: nginx-load-balancer
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - breezy-network

  nginx-internal:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./infra/nginx-internal/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    networks:
      - breezy-network

  auth-postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./apps/api-gateway/.env
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://nginx-internal
    depends_on:
      - nginx-internal
      - auth-service
    networks:
      - breezy-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://auth_user:auth_password@auth-postgres:5432/auth_db?schema=public
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - breezy-network

volumes:
  auth_postgres_data:

networks:
  breezy-network:
    driver: bridge