x-replicated-service: &replicated-service
  replicas: ${APP_REPLICAS:-3}
  update_config:
    parallelism: 1
    delay: 10s
    order: start-first
    failure_action: rollback
  rollback_config:
    parallelism: 1
    delay: 10s
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

x-singleton-service: &singleton-service
  replicas: 1
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

services:
  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: ${PUBLIC_HTTP_PORT:-80}
        protocol: tcp
        mode: ingress
      - target: 443
        published: ${PUBLIC_HTTPS_PORT:-8443}
        protocol: tcp
        mode: ingress
      - target: 9001
        published: ${MINIO_CONSOLE_PUBLIC_PORT:-9001}
        protocol: tcp
        mode: ingress
    configs:
      - source: nginx_public_conf
        target: /etc/nginx/nginx.conf
    volumes:
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - api-gateway
      - frontend
      - minio
      - chat-service
    networks:
      - breezy-network
    deploy: *singleton-service

  nginx-internal:
    image: nginx:alpine
    configs:
      - source: nginx_internal_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - auth-service
      - user-service
      - profile-service
      - post-service
      - media-service
      - follow-service
      - chat-service
      - notification-service
    networks:
      - breezy-network
    deploy: *replicated-service

  api-gateway:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/api-gateway:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN}
      INTERNAL_NGINX_URL: http://nginx-internal
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-10000}
    networks:
      - breezy-network
    deploy: *replicated-service

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/frontend:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 4000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_URL: http://api-gateway:3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    networks:
      - breezy-network
    deploy: *replicated-service

  auth-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/auth-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://${AUTH_POSTGRES_USER:?Set AUTH_POSTGRES_USER}:${AUTH_POSTGRES_PASSWORD:?Set AUTH_POSTGRES_PASSWORD}@auth-postgres:5432/${AUTH_POSTGRES_DB:?Set AUTH_POSTGRES_DB}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
    depends_on:
      - auth-postgres
    networks:
      - breezy-network
    deploy: *replicated-service

  user-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/user-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3002
      SERVICE_NAME: user-service
      DATABASE_URL: postgresql://${USER_POSTGRES_USER:?Set USER_POSTGRES_USER}:${USER_POSTGRES_PASSWORD:?Set USER_POSTGRES_PASSWORD}@user-postgres:5432/${USER_POSTGRES_DB:?Set USER_POSTGRES_DB}?schema=public
    depends_on:
      - user-postgres
    networks:
      - breezy-network
    deploy: *replicated-service

  follow-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/follow-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3004
      SERVICE_NAME: follow-service
      DATABASE_URL: postgresql://${FOLLOW_POSTGRES_USER:?Set FOLLOW_POSTGRES_USER}:${FOLLOW_POSTGRES_PASSWORD:?Set FOLLOW_POSTGRES_PASSWORD}@follow-postgres:5432/${FOLLOW_POSTGRES_DB:?Set FOLLOW_POSTGRES_DB}?schema=public
      INTERNAL_NGINX_URL: http://nginx-internal
    depends_on:
      - follow-postgres
    networks:
      - breezy-network
    deploy: *replicated-service

  profile-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/profile-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3006
      SERVICE_NAME: profile-service
      MONGO_URI: mongodb://profile-mongodb:27017/${PROFILE_MONGO_DB:-profile_db}
    depends_on:
      - profile-mongodb
    networks:
      - breezy-network
    deploy: *replicated-service

  post-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/post-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3003
      SERVICE_NAME: post-service
      MONGO_URI: mongodb://post-mongodb:27017/${POST_MONGO_DB:-post_db}
      INTERNAL_NGINX_URL: http://nginx-internal
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-10000}
      NOTIFICATION_SERVICE_URL: http://notification-service:3008
      PROFILE_SERVICE_URL: http://profile-service:3006
    depends_on:
      - post-mongodb
      - notification-service
      - profile-service
    networks:
      - breezy-network
    deploy: *replicated-service

  interaction-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/interaction-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3007
      SERVICE_NAME: interaction-service
      MONGO_URI: mongodb://interaction-mongodb:27017/${INTERACTION_MONGO_DB:-interaction_db}
      INTERNAL_NGINX_URL: http://nginx-internal
    depends_on:
      - interaction-mongodb
      - nginx-internal
    networks:
      - breezy-network
    deploy: *replicated-service

  notification-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/notification-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3008
      SERVICE_NAME: notification-service
      MONGO_URI: mongodb://notification-mongodb:27017/${NOTIFICATION_MONGO_DB:-notification_db}
    depends_on:
      - notification-mongodb
    networks:
      - breezy-network
    deploy: *replicated-service

  media-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/media-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3005
      SERVICE_NAME: media-service
      MONGO_URI: mongodb://media-mongodb:27017/${MEDIA_MONGO_DB:-media_db}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-breezy-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:?Set MINIO_PUBLIC_URL}
    depends_on:
      - media-mongodb
      - minio
    networks:
      - breezy-network
    deploy: *replicated-service

  chat-service:
    image: ${IMAGE_REGISTRY:-ghcr.io/asrip/projet-api-groupe4}/chat-service:${IMAGE_TAG:?Set IMAGE_TAG}
    environment:
      NODE_ENV: production
      PORT: 3009
      SERVICE_NAME: chat-service
      CORS_ORIGIN: ${CORS_ORIGIN:?Set CORS_ORIGIN}
      AUTH_VERIFY_URL: http://auth-service:3001/auth/verify
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-10000}
      SOCKET_PATH: /chat/socket.io
      MESSAGE_MAX_LENGTH: ${CHAT_MESSAGE_MAX_LENGTH:-1000}
    depends_on:
      - auth-service
    networks:
      - breezy-network
    deploy: *singleton-service

  auth-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${AUTH_POSTGRES_USER:?Set AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD:?Set AUTH_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AUTH_POSTGRES_DB:?Set AUTH_POSTGRES_DB}
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER:?Set AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB:?Set AUTH_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  user-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER:?Set USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD:?Set USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB:?Set USER_POSTGRES_DB}
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_POSTGRES_USER:?Set USER_POSTGRES_USER} -d ${USER_POSTGRES_DB:?Set USER_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  follow-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${FOLLOW_POSTGRES_USER:?Set FOLLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${FOLLOW_POSTGRES_PASSWORD:?Set FOLLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${FOLLOW_POSTGRES_DB:?Set FOLLOW_POSTGRES_DB}
    volumes:
      - follow_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FOLLOW_POSTGRES_USER:?Set FOLLOW_POSTGRES_USER} -d ${FOLLOW_POSTGRES_DB:?Set FOLLOW_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  profile-mongodb:
    image: mongo:8
    volumes:
      - profile_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  post-mongodb:
    image: mongo:8
    volumes:
      - post_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  interaction-mongodb:
    image: mongo:8
    volumes:
      - interaction_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  notification-mongodb:
    image: mongo:8
    volumes:
      - notification_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  media-mongodb:
    image: mongo:8
    volumes:
      - media_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy: *singleton-service

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-http://minio:9000}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:?Set MINIO_BROWSER_REDIRECT_URL}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - breezy-network
    deploy: *singleton-service

configs:
  nginx_public_conf:
    file: ./infra/nginx/nginx.prod.conf
  nginx_internal_conf:
    file: ./infra/nginx-internal/nginx.conf

volumes:
  auth_postgres_data:
  user_postgres_data:
  follow_postgres_data:
  profile_mongodb_data:
  post_mongodb_data:
  interaction_mongodb_data:
  notification_mongodb_data:
  media_mongodb_data:
  minio_data:
  certbot_webroot:

networks:
  breezy-network:
    driver: overlay
    attachable: true
