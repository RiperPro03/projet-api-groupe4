name: GitHub CI/CD Pipeline

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    paths:
      - "services/auth-service/**"
      - "services/user-service/**"
      - "services/profile-service/**"
      - "services/follow-service/**"
      - "services/interaction-service/**"
      - ".github/workflows/github-CICD.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "services/auth-service/**"
      - "services/user-service/**"
      - "services/profile-service/**"
      - "services/follow-service/**"
      - "services/interaction-service/**"
      - ".github/workflows/github-CICD.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      profile: ${{ steps.filter.outputs.profile }}
      follow: ${{ steps.filter.outputs.follow }}
      interaction: ${{ steps.filter.outputs.interaction }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - ".github/workflows/github-CICD.yml"
              - "pnpm-lock.yaml"
              - "package.json"
              - "pnpm-workspace.yaml"
            auth:
              - "services/auth-service/**"
            user:
              - "services/user-service/**"
            profile:
              - "services/profile-service/**"
            follow:
              - "services/follow-service/**"
            interaction:
              - "services/interaction-service/**"

  auth-service:
    name: Stage 1 - Auth Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.auth == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_service_test
      JWT_ACCESS_SECRET: test_access_secret
      JWT_REFRESH_SECRET: test_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: "7"
      SERVICE_NAME: auth-service-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  user-service:
    name: Stage 2 - User Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.user == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/user_service_test
      SERVICE_NAME: user-service-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  profile-service:
    name: Stage 3 - Profile Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.profile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/profile-service
    env:
      NODE_ENV: test
      SERVICE_NAME: profile-service-test
      MONGO_URI: mongodb://localhost:27019/profile_service_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  follow-service:
    name: Stage 4 - Follow Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.follow == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/follow-service
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/follow_service_test
      SERVICE_NAME: follow-service-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  interaction-service:
    name: Stage 5 - Interaction Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.interaction == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/interaction-service
    env:
      NODE_ENV: test
      SERVICE_NAME: interaction-service-test
      MONGO_URI: mongodb://localhost:27020/interaction_service_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage
