name: GitHub CI/CD Pipeline

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  push:
    paths:
      - "services/auth-service/**"
      - "services/user-service/**"
      - "services/profile-service/**"
      - "services/follow-service/**"
      - "services/interaction-service/**"
      - "services/media-service/**"
      - "services/notification-service/**"
      - "services/chat-service/**"
      - "services/post-service/**"
      - "apps/api-gateway/**"
      - ".github/workflows/github-CICD.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
  pull_request:
    paths:
      - "services/auth-service/**"
      - "services/user-service/**"
      - "services/profile-service/**"
      - "services/follow-service/**"
      - "services/interaction-service/**"
      - "services/media-service/**"
      - "services/notification-service/**"
      - "services/chat-service/**"
      - "services/post-service/**"
      - "apps/api-gateway/**"
      - ".github/workflows/github-CICD.yml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      auth: ${{ steps.filter.outputs.auth }}
      user: ${{ steps.filter.outputs.user }}
      profile: ${{ steps.filter.outputs.profile }}
      follow: ${{ steps.filter.outputs.follow }}
      interaction: ${{ steps.filter.outputs.interaction }}
      media: ${{ steps.filter.outputs.media }}
      notification: ${{ steps.filter.outputs.notification }}
      chat: ${{ steps.filter.outputs.chat }}
      post: ${{ steps.filter.outputs.post }}
      api_gateway: ${{ steps.filter.outputs.api_gateway }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - ".github/workflows/github-CICD.yml"
              - "pnpm-lock.yaml"
              - "package.json"
              - "pnpm-workspace.yaml"
            auth:
              - "services/auth-service/**"
            user:
              - "services/user-service/**"
            profile:
              - "services/profile-service/**"
            follow:
              - "services/follow-service/**"
            interaction:
              - "services/interaction-service/**"
            media:
              - "services/media-service/**"
            notification:
              - "services/notification-service/**"
            chat:
              - "services/chat-service/**"
            post:
              - "services/post-service/**"
            api_gateway:
              - "apps/api-gateway/**"

  api-gateway:
    name: Stage 0 - API Gateway
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.api_gateway == 'true' }}
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      INTERNAL_NGINX_URL: http://nginx-internal
      REQUEST_TIMEOUT_MS: "10000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm --filter api-gateway build

      - name: Run Vitest with coverage
        run: pnpm --filter api-gateway test:coverage

  auth-service:
    name: Stage 1 - Auth Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.auth == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auth_service_test
      JWT_ACCESS_SECRET: test_access_secret
      JWT_REFRESH_SECRET: test_refresh_secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN_DAYS: "7"
      SERVICE_NAME: auth-service-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  user-service:
    name: Stage 2 - User Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.user == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/user_service_test
      SERVICE_NAME: user-service-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  profile-service:
    name: Stage 3 - Profile Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.profile == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/profile-service
    env:
      NODE_ENV: test
      SERVICE_NAME: profile-service-test
      MONGO_URI: mongodb://localhost:27019/profile_service_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  follow-service:
    name: Stage 4 - Follow Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.follow == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/follow-service
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/follow_service_test
      SERVICE_NAME: follow-service-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  interaction-service:
    name: Stage 5 - Interaction Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.interaction == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/interaction-service
    env:
      NODE_ENV: test
      SERVICE_NAME: interaction-service-test
      MONGO_URI: mongodb://localhost:27020/interaction_service_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  media-service:
    name: Stage 6 - Media Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.media == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/media-service
    env:
      NODE_ENV: test
      SERVICE_NAME: media-service-test
      MONGO_URI: mongodb://localhost:27022/media_service_test
      MINIO_ENDPOINT: localhost
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: breezy-media-test
      MINIO_PUBLIC_URL: http://localhost:9000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  notification-service:
    name: Stage 7 - Notification Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.notification == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    env:
      NODE_ENV: test
      SERVICE_NAME: notification-service-test
      MONGO_URI: mongodb://localhost:27023/notification_service_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  post-service:
    name: Stage 9 - Post Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.post == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/post-service
    env:
      NODE_ENV: test
      SERVICE_NAME: post-service-test
      MONGO_URI: mongodb://localhost:27021/post_service_test
      NOTIFICATION_SERVICE_URL: http://localhost:3008
      PROFILE_SERVICE_URL: http://localhost:3006

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage

  chat-service:
    name: Stage 8 - Chat Service
    needs: changes
    if: ${{ needs.changes.outputs.shared == 'true' || needs.changes.outputs.chat == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/chat-service
    env:
      NODE_ENV: test
      SERVICE_NAME: chat-service-test
      AUTH_VERIFY_URL: http://localhost:3001/auth/verify
      SOCKET_PATH: /chat/socket.io
      MESSAGE_MAX_LENGTH: "1000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Run Vitest with coverage
        run: pnpm test:coverage
