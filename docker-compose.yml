services:
  nginx:
    image: nginx:alpine
    container_name: nginx-public
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - breezy-network

  nginx-internal:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./infra/nginx-internal/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - profile-service
      - post-service
      - follow-service
      - interaction-service
    networks:
      - breezy-network

  auth-postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-postgres:
    image: postgres:17-alpine
    container_name: user-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_password
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  follow-postgres:
    image: postgres:17-alpine
    container_name: follow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: follow_user
      POSTGRES_PASSWORD: follow_password
      POSTGRES_DB: follow_db
    ports:
      - "5435:5432"
    volumes:
      - follow_postgres_data:/var/lib/postgresql/data
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U follow_user -d follow_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-mongodb:
    image: mongo:8
    container_name: profile-mongodb
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - profile_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10

  interaction-mongodb:
    image: mongo:8
    container_name: interaction-mongodb
    restart: unless-stopped
    ports:
      - "27020:27017"
    volumes:
      - interaction_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10

  post-mongodb:
    image: mongo:8
    container_name: post-mongodb
    restart: unless-stopped
    ports:
      - "27021:27017"
    volumes:
      - post_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./apps/api-gateway/.env
    environment:
      PORT: 3000
      INTERNAL_NGINX_URL: http://nginx-internal
    depends_on:
      - nginx-internal
    networks:
      - breezy-network

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./services/auth-service/.env
    environment:
      DATABASE_URL: postgresql://auth_user:auth_password@auth-postgres:5432/auth_db?schema=public
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - breezy-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3002"
    env_file:
      - ./services/user-service/.env
    environment:
      DATABASE_URL: postgresql://user_user:user_password@user-postgres:5432/user_db?schema=public
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - breezy-network

  follow-service:
    build:
      context: ./services/follow-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3004"
    environment:
      PORT: 3004
      SERVICE_NAME: follow-service
      DATABASE_URL: postgresql://follow_user:follow_password@follow-postgres:5432/follow_db?schema=public
    depends_on:
      follow-postgres:
        condition: service_healthy
    networks:
      - breezy-network

  profile-service:
    build:
      context: ./services/profile-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3006"
    env_file:
      - ./services/profile-service/.env
    environment:
      MONGO_URI: mongodb://profile-mongodb:27017/profile_db
    depends_on:
      profile-mongodb:
        condition: service_healthy
    networks:
      - breezy-network

  interaction-service:
    build:
      context: ./services/interaction-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose: 
      - "3007"
    environment:
      PORT: 3007
      SERVICE_NAME: interaction-service
      MONGO_URI: mongodb://interaction-mongodb:27017/interaction_db
    depends_on:
      interaction-mongodb:
        condition: service_healthy
    networks:
      - breezy-network
        
  post-service:
    build:
      context: ./services/post-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3003"
    env_file:
      - ./services/post-service/.env
    environment:
      PORT: 3003
      MONGO_URI: mongodb://post-mongodb:27017/post_db
      SERVICE_NAME: post-service
    depends_on:
      post-mongodb:
        condition: service_healthy
    networks:
      - breezy-network

  minio:
    image: minio/minio
    container_name: breezy-minio
    ports:
      - "9000:9000"   # API S3 (upload/download)
      - "9001:9001"   # Console web d'administration
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - breezy-network
  media-mongodb:
    image: mongo:8
    container_name: media-mongodb
    restart: unless-stopped
    ports:
      - "27022:27017"
    volumes:
      - media_mongodb_data:/data/db
    networks:
      - breezy-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10

  media-service:
    build:
      context: .
      dockerfile: ./services/media-service/Dockerfile
    restart: unless-stopped
    expose:
      - "3005"
    environment:
      PORT: 3005
      SERVICE_NAME: media-service
      MONGO_URI: mongodb://media-mongodb:27017/media_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: breezy-media
      MINIO_PUBLIC_URL: http://localhost:9000
    depends_on:
      media-mongodb:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - breezy-network

volumes:
  auth_postgres_data:
  user_postgres_data:
  follow_postgres_data:
  profile_mongodb_data:
  interaction_mongodb_data:
  post_mongodb_data:
  minio_data:
  media_mongodb_data:

networks:
  breezy-network:
    driver: bridge
