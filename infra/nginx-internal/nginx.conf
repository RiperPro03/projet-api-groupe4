events {}

http {
    upstream auth_service_cluster {
        least_conn;
        server auth-service:3001;
    }

    upstream user_service_cluster {
        least_conn;
        server user-service:3002;
    }

    upstream profile_service_cluster {
        least_conn;
        server profile-service:3006;
    }

    upstream follow_service_cluster {
        least_conn;
        server follow-service:3004;
    }

    server {
        listen 80;
        server_name _;

        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-internal","status":"OK"}';
        }

        location = /auth {
            return 308 /auth/;
        }

        location /auth/ {
            proxy_pass http://auth_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /users {
            return 308 /users/;
        }

        location /users/ {
            proxy_pass http://user_service_cluster/users-state/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /profiles {
            return 308 /profiles/;
        }

        location /profiles/ {
            proxy_pass http://profile_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /follows {
            return 308 /follows/;
        }

        location /follows/ {
            proxy_pass http://follow_service_cluster;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            default_type application/json;
            return 404 '{"status":"error","message":"Unknown internal route"}';
        }
    }
}
